name: freelance
description: Plugin Flutter qui contient l'ensemble de mes outils de réalisation
  d'application web et mobile.
version: 1.0.0+7
homepage: https://freelance.benoitfontaine.fr/
repository: https://github.com/benoit-fontaine/freelance

environment:
  sdk: '>=3.4.3 <4.0.0'
  flutter: ">=3.22.2"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter


  animations: ^2.0.11
  animator: ^3.3.0
  bloc: ^8.1.4
  equatable: ^2.0.5
  firebase_storage: ^12.1.0
  flutter_bloc: ^8.1.6
  flutter_markdown: ^0.7.2+1
  get_it: ^7.7.0
  go_router: ^14.2.0
  intl: ^0.19.0
  nil: ^1.1.1
  plugin_platform_interface: ^2.1.8
  url_launcher: ^6.3.0
  widgetbook: ^3.8.0

dev_dependencies:
  bdd_widget_test: ^1.7.4
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: fr.benoitfontaine.freelance
        pluginClass: FreelancePlugin
      ios:
        pluginClass: FreelancePlugin
      linux:
        pluginClass: FreelancePlugin
      macos:
        pluginClass: FreelancePlugin
      windows:
        pluginClass: FreelancePluginCApi
      web:
        pluginClass: FreelanceWeb
        fileName: method_channels/freelance_web.dart
